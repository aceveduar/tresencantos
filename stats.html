<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Estadísticas — Tres Encantos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F7F2EB;--gold:#C9A462;--gold-dark:#A67C3A;--gold-light:#FFF8EE;
  --charcoal:#1C1817;--muted:#8A7564;--muted-light:#B5A696;
  --red:#E85D5D;--green:#2D6A4F;--amber:#F59E0B;
  --border:#EAE0D4;--shadow:0 4px 20px rgba(28,24,23,.1);--r:14px;
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh}
button,select{font-family:inherit}
*{-webkit-tap-highlight-color:transparent}

/* ── TOPBAR ── */
.topbar{
  background:var(--charcoal);color:#fff;
  padding:0 28px;height:62px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 12px rgba(28,24,23,.25);
}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-left img{height:34px;border-radius:5px}
.topbar-title{font-family:'Playfair Display',serif;font-size:1rem;color:rgba(255,255,255,.9)}
.topbar-right{display:flex;gap:10px;align-items:center}
.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:50px;font-size:.8rem;font-weight:600;
  border:1.5px solid rgba(255,255,255,.25);color:#fff;background:transparent;
  cursor:pointer;text-decoration:none;transition:.15s;
}
.btn-back:hover{background:rgba(255,255,255,.1)}

/* ── MAIN ── */
main{max-width:1080px;margin:0 auto;padding:28px 28px 60px}

/* ── PERIOD SELECTOR ── */
.period-bar{
  display:flex;gap:8px;margin-bottom:26px;
  background:#fff;border:1px solid var(--border);
  border-radius:50px;padding:5px;width:fit-content;
  box-shadow:0 2px 8px rgba(28,24,23,.07);
}
.period-btn{
  padding:7px 18px;border-radius:50px;font-size:.82rem;font-weight:600;
  border:none;background:transparent;cursor:pointer;color:var(--muted);transition:.18s;
  white-space:nowrap;
}
.period-btn.active{background:var(--charcoal);color:#fff}
.period-btn:hover:not(.active){background:var(--cream);color:var(--charcoal)}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi-card{
  background:#fff;border-radius:var(--r);padding:20px 20px 18px;
  border:1px solid var(--border);box-shadow:0 2px 8px rgba(28,24,23,.06);
  position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s;
}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card:nth-child(1)::before{background:linear-gradient(90deg,var(--gold),var(--gold-dark))}
.kpi-card:nth-child(2)::before{background:linear-gradient(90deg,#34d399,#059669)}
.kpi-card:nth-child(3)::before{background:linear-gradient(90deg,#60a5fa,#2563eb)}
.kpi-card:nth-child(4)::before{background:linear-gradient(90deg,var(--red),#c84444)}
.kpi-icon{font-size:1.3rem;margin-bottom:10px;display:block}
.kpi-value{font-family:'Playfair Display',serif;font-size:1.85rem;font-weight:600;line-height:1;color:var(--charcoal)}
.kpi-label{font-size:.68rem;color:var(--muted);margin-top:7px;letter-spacing:.07em;text-transform:uppercase;font-weight:500}
.kpi-sub{font-size:.72rem;color:var(--muted-light);margin-top:4px}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 8px rgba(28,24,23,.06);overflow:hidden}
.card-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-head h2{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--charcoal)}
.card-head span{font-size:.75rem;color:var(--muted)}
.card-body{padding:20px 22px}

/* ── CHARTS ROW ── */
.charts-row{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:16px}
.chart-canvas-wrap{position:relative;height:240px}

/* ── TOP PRODUCTOS ── */
.top-prod-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.top-prod-item:last-child{border-bottom:none}
.tp-rank{width:22px;height:22px;border-radius:50%;background:var(--cream);color:var(--muted);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-prod-item:nth-child(1) .tp-rank{background:var(--gold);color:#fff}
.top-prod-item:nth-child(2) .tp-rank{background:#9B8B78;color:#fff}
.top-prod-item:nth-child(3) .tp-rank{background:#C9A07E;color:#fff}
.tp-info{flex:1;min-width:0}
.tp-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--charcoal)}
.tp-bar-wrap{height:4px;background:#F0E8E0;border-radius:2px;margin-top:5px;overflow:hidden}
.tp-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-dark));border-radius:2px;transition:width .4s ease}
.tp-stats{text-align:right;flex-shrink:0}
.tp-revenue{font-size:.82rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--charcoal)}
.tp-qty{font-size:.7rem;color:var(--muted);margin-top:2px}

/* ── SEGUNDA FILA ── */
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* ── INVENTARIO ── */
.inv-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.inv-stat{border-radius:10px;padding:14px 16px;text-align:center}
.inv-stat.red{background:#FEE2E2;border:1px solid #FECACA}
.inv-stat.amber{background:#FEF3C7;border:1px solid #FDE68A}
.inv-stat.green{background:#D1FAE5;border:1px solid #A7F3D0}
.inv-stat .n{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:600}
.inv-stat.red .n{color:#991B1B}
.inv-stat.amber .n{color:#92400E}
.inv-stat.green .n{color:#065F46}
.inv-stat .l{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.inv-stat.red .l{color:#B91C1C}
.inv-stat.amber .l{color:#78350F}
.inv-stat.green .l{color:#047857}

.inv-list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.inv-list-item:last-child{border-bottom:none}
.inv-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;margin-right:10px}
.badge-sm{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:50px;white-space:nowrap}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-amber{background:#FEF3C7;color:#92400E}

/* ── VENTAS RECIENTES ── */
.recent-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.recent-item:last-child{border-bottom:none}
.recent-time{color:var(--muted);font-size:.72rem;white-space:nowrap}
.recent-products{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--charcoal);font-weight:500}
.recent-amount{font-family:'Playfair Display',serif;font-weight:700;color:var(--green);white-space:nowrap}

/* ── LOADING / EMPTY ── */
.loading-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:.88rem}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.no-data{text-align:center;padding:32px;color:var(--muted-light);font-size:.84rem}

/* ── MOBILE ── */
@media(max-width:768px){
  main{padding:16px 12px 48px}
  .topbar{padding:0 14px;height:56px}
  .topbar-left img{height:28px}
  .topbar-title{font-size:.9rem}

  /* Period bar: touch targets mínimos 44px */
  .period-bar{width:100%;border-radius:12px;justify-content:space-between;padding:4px}
  .period-btn{flex:1;text-align:center;padding:10px 6px;font-size:.76rem;min-height:44px;display:flex;align-items:center;justify-content:center}

  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .kpi-card{padding:14px 14px 12px}
  .kpi-value{font-size:1.35rem}
  .kpi-label{font-size:.63rem}

  .charts-row{grid-template-columns:1fr;gap:12px}
  .chart-canvas-wrap{height:190px}
  .bottom-row{grid-template-columns:1fr;gap:12px}
  .card-head{padding:13px 14px 11px}
  .card-body{padding:12px 14px}

  /* Inventario: 3 col → 1 fila responsive */
  .inv-summary{grid-template-columns:repeat(3,1fr);gap:8px}
  .inv-stat{padding:10px 8px}
  .inv-stat .n{font-size:1.3rem}
  .inv-stat .l{font-size:.62rem}
}

@media(max-width:480px){
  .kpi-icon{font-size:1rem;margin-bottom:6px}
  .kpi-value{font-size:1.2rem}
  .topbar-right .btn-back span{display:none}

  /* Inventario: 3 col muy pequeño → 2+1 */
  .inv-summary{grid-template-columns:1fr 1fr;gap:8px}
  .inv-stat:nth-child(3){grid-column:1/-1}
}

@media(max-width:360px){
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
  .period-btn{font-size:.7rem;padding:10px 4px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="logo.png" alt="Tres Encantos">
    <span class="topbar-title">Estadísticas</span>
  </div>
  <div class="topbar-right">
    <a href="admin.html" class="btn-back">← <span>Admin</span></a>
  </div>
</div>

<main>

  <!-- PERÍODO -->
  <div class="period-bar">
    <button class="period-btn" data-period="today" onclick="setPeriod('today')">Hoy</button>
    <button class="period-btn active" data-period="week" onclick="setPeriod('week')">7 días</button>
    <button class="period-btn" data-period="month" onclick="setPeriod('month')">30 días</button>
    <button class="period-btn" data-period="all" onclick="setPeriod('all')">Todo</button>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <span class="kpi-icon si-gold">💰</span>
      <div class="kpi-value" id="kpi-revenue">—</div>
      <div class="kpi-label">Ingresos</div>
      <div class="kpi-sub" id="kpi-revenue-sub"></div>
    </div>
    <div class="kpi-card">
      <span class="kpi-icon si-green">🛍</span>
      <div class="kpi-value" id="kpi-sales">—</div>
      <div class="kpi-label">Ventas</div>
      <div class="kpi-sub" id="kpi-sales-sub"></div>
    </div>
    <div class="kpi-card">
      <span class="kpi-icon si-blue">📊</span>
      <div class="kpi-value" id="kpi-avg">—</div>
      <div class="kpi-label">Ticket promedio</div>
      <div class="kpi-sub" id="kpi-avg-sub"></div>
    </div>
    <div class="kpi-card">
      <span class="kpi-icon si-red">📦</span>
      <div class="kpi-value" id="kpi-stock">—</div>
      <div class="kpi-label">Productos en stock</div>
      <div class="kpi-sub" id="kpi-stock-sub"></div>
    </div>
  </div>

  <!-- GRÁFICAS FILA 1 -->
  <div class="charts-row">
    <div class="card">
      <div class="card-head">
        <h2>Ingresos por día</h2>
        <span id="chart-period-label"></span>
      </div>
      <div class="card-body">
        <div class="chart-canvas-wrap">
          <canvas id="revenue-chart"></canvas>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>Por categoría</h2>
      </div>
      <div class="card-body">
        <div class="chart-canvas-wrap" style="height:220px">
          <canvas id="cat-chart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- FILA 2: Top Productos + Ventas Recientes -->
  <div class="bottom-row">
    <div class="card">
      <div class="card-head">
        <h2>Productos más vendidos</h2>
        <span id="top-prod-period"></span>
      </div>
      <div class="card-body" style="padding-top:8px;padding-bottom:8px">
        <div id="top-products">
          <div class="loading-state"><div class="loading-spinner"></div>Cargando…</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2>Ventas recientes</h2>
        <span id="recent-period"></span>
      </div>
      <div class="card-body" style="padding-top:8px;padding-bottom:8px">
        <div id="recent-sales">
          <div class="loading-state"><div class="loading-spinner"></div>Cargando…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- HORA PICO -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-head">
      <h2>Hora pico</h2>
      <span id="hour-period-label"></span>
    </div>
    <div class="card-body">
      <div class="chart-canvas-wrap" style="height:200px">
        <canvas id="hour-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- INVENTARIO -->
  <div class="card">
    <div class="card-head">
      <h2>Estado del inventario</h2>
      <span id="inv-total-label"></span>
    </div>
    <div class="card-body">
      <div class="inv-summary">
        <div class="inv-stat red">
          <div class="n" id="inv-out">0</div>
          <div class="l">Agotados</div>
        </div>
        <div class="inv-stat amber">
          <div class="n" id="inv-low">0</div>
          <div class="l">Última unidad</div>
        </div>
        <div class="inv-stat green">
          <div class="n" id="inv-ok">0</div>
          <div class="l">Con existencias</div>
        </div>
      </div>
      <div id="inv-list"></div>
    </div>
  </div>

</main>

<script>
/* ── CONFIG ── */
const SUPABASE_URL = 'https://qxvrggmpaqhslgdmbhqw.supabase.co';
const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4dnJnZ21wYXFoc2xnZG1iaHF3Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODUyNjIyNiwiZXhwIjoyMDk0MTAyMjI2fQ.B9nZ1KENDQsUtn9PFwiMTrXuMZuWWIphGnH8XPfeJjQ';
const SESSION_KEY = 'te_admin_session';

/* ── AUTH ── */
(function(){
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (!(s?.access_token && s.expires_at > Math.floor(Date.now()/1000)+60))
      window.location.href = 'admin.html';
  } catch { window.location.href = 'admin.html'; }
})();

/* ── API ── */
function api(path, opts={}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      apikey: SUPABASE_SERVICE_KEY,
      Authorization: `Bearer ${SUPABASE_SERVICE_KEY}`,
      'Content-Type': 'application/json',
      ...opts.headers
    }
  }).then(async r => {
    const data = await r.json().catch(() => null);
    return { ok: r.ok, data };
  });
}

/* ── STATE ── */
let currentPeriod = 'week';
let sales = [];
let prevSales = [];   // período anterior para comparación
let products = [];
let revenueChart = null;
let catChart = null;
let hourChart = null;

/* ── PERIODS ── */
const PERIODS = {
  today: () => { const d = new Date(); d.setHours(0,0,0,0); return d.toISOString(); },
  week:  () => { const d = new Date(); d.setDate(d.getDate()-6); d.setHours(0,0,0,0); return d.toISOString(); },
  month: () => { const d = new Date(); d.setDate(d.getDate()-29); d.setHours(0,0,0,0); return d.toISOString(); },
  all:   () => null
};
// Retorna el inicio del período ANTERIOR equivalente (para comparar)
const PREV_PERIODS = {
  today: () => { const d = new Date(); d.setDate(d.getDate()-1); d.setHours(0,0,0,0); return [d.toISOString(), PERIODS.today()]; },
  week:  () => { const e = new Date(); e.setDate(e.getDate()-6); e.setHours(0,0,0,0); const s = new Date(e); s.setDate(s.getDate()-7); return [s.toISOString(), e.toISOString()]; },
  month: () => { const e = new Date(); e.setDate(e.getDate()-29); e.setHours(0,0,0,0); const s = new Date(e); s.setDate(s.getDate()-30); return [s.toISOString(), e.toISOString()]; },
  all:   () => null
};
const PERIOD_LABELS = { today:'Hoy', week:'Últimos 7 días', month:'Últimos 30 días', all:'Todo el tiempo' };

/* ── LOAD ── */
async function loadSales() {
  const from = PERIODS[currentPeriod]();
  const filter = from ? `&created_at=gte.${from}` : '';
  const r = await api(`sales?select=id,total,created_at,items,payment_method,type&order=created_at.desc${filter}&limit=500`);
  sales = (r.ok && Array.isArray(r.data)) ? r.data.filter(s => s.type !== 'apartado') : [];
}

async function loadPreviousSales() {
  const range = PREV_PERIODS[currentPeriod]?.();
  if (!range) { prevSales = []; return; }
  const [from, to] = range;
  const r = await api(`sales?select=id,total,created_at,type&created_at=gte.${from}&created_at=lt.${to}&limit=500`);
  prevSales = (r.ok && Array.isArray(r.data)) ? r.data.filter(s => s.type !== 'apartado') : [];
}

async function loadProducts() {
  const r = await api('products?select=id,name,category,category_label,price,stock,out_of_stock&order=position.asc&limit=500');
  products = (r.ok && Array.isArray(r.data)) ? r.data : [];
}

/* ── RENDER ── */
function renderAll() {
  const lbl = PERIOD_LABELS[currentPeriod];
  document.getElementById('chart-period-label').textContent = lbl;
  document.getElementById('top-prod-period').textContent = lbl;
  document.getElementById('recent-period').textContent = lbl;
  document.getElementById('hour-period-label').textContent = lbl;

  renderKPIs();
  renderRevenueChart();
  renderCatChart();
  renderTopProducts();
  renderRecentSales();
  renderHourChart();
  renderInventory();
}

/* KPIs con delta vs período anterior */
function kpiDelta(curr, prev) {
  if (!prev || currentPeriod === 'all') return '';
  if (prev === 0) return '';
  const pct = (curr - prev) / prev * 100;
  const sign = pct >= 0 ? '+' : '';
  const color = pct >= 0 ? '#065F46' : '#991B1B';
  const bg    = pct >= 0 ? '#D1FAE5' : '#FEE2E2';
  return ` <span style="font-size:.66rem;font-weight:700;padding:2px 6px;border-radius:50px;background:${bg};color:${color}">${sign}${pct.toFixed(0)}%</span>`;
}

function renderKPIs() {
  const totalRev  = sales.reduce((s,x) => s + parseFloat(x.total||0), 0);
  const count     = sales.length;
  const avg       = count ? totalRev / count : 0;
  const inStock   = products.filter(p => p.stock > 0 && !p.out_of_stock).length;
  const total     = products.length;

  const prevRev   = prevSales.reduce((s,x) => s + parseFloat(x.total||0), 0);
  const prevCount = prevSales.length;
  const prevAvg   = prevCount ? prevRev / prevCount : 0;

  const fmt = n => `$${n.toLocaleString('es-MX', {maximumFractionDigits:0})}`;

  document.getElementById('kpi-revenue').innerHTML = fmt(totalRev) + kpiDelta(totalRev, prevRev);
  document.getElementById('kpi-revenue-sub').textContent = prevRev > 0 ? `Período ant.: ${fmt(prevRev)}` : '';
  document.getElementById('kpi-sales').innerHTML = count + kpiDelta(count, prevCount);
  document.getElementById('kpi-sales-sub').textContent = prevCount > 0 ? `Período ant.: ${prevCount}` : '';
  document.getElementById('kpi-avg').innerHTML = (count ? fmt(avg) : '—') + kpiDelta(avg, prevAvg);
  document.getElementById('kpi-avg-sub').textContent = prevAvg > 0 ? `Período ant.: ${fmt(prevAvg)}` : '';
  document.getElementById('kpi-stock').textContent = inStock;
  document.getElementById('kpi-stock-sub').textContent = `de ${total} producto${total!==1?'s':''}`;
}

/* Hora pico */
function renderHourChart() {
  const byHour = Array(24).fill(0);
  sales.forEach(s => { byHour[new Date(s.created_at).getHours()] += parseFloat(s.total||0); });
  const ctx = document.getElementById('hour-chart')?.getContext('2d');
  if (!ctx) return;
  if (hourChart) { hourChart.destroy(); hourChart = null; }
  if (sales.length === 0) {
    document.getElementById('hour-chart').parentElement.innerHTML = '<p class="no-data">Sin datos en el período</p>';
    return;
  }
  const maxH = byHour.indexOf(Math.max(...byHour));
  hourChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Array.from({length:24}, (_,i) => `${i}h`),
      datasets: [{
        data: byHour,
        backgroundColor: byHour.map((_, i) => i === maxH ? '#C9A462' : 'rgba(201,164,98,.35)'),
        borderRadius: 4, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c => `$${c.parsed.y.toLocaleString('es-MX')}` }}},
      scales: {
        y: { beginAtZero:true, ticks:{ callback: v=>`$${v.toLocaleString('es-MX')}`, font:{size:10} }, grid:{color:'#F0E8E0'} },
        x: { grid:{display:false}, ticks:{font:{size:9}, maxRotation:0} }
      }
    }
  });
}

/* Revenue chart */
function renderRevenueChart() {
  const byDay = {};
  // Fill all days in range
  const from = PERIODS[currentPeriod]();
  const start = from ? new Date(from) : new Date(Math.min(...sales.map(s=>new Date(s.created_at))));
  const end = new Date(); end.setHours(23,59,59,999);
  if (sales.length === 0 && !from) {
    destroyChart('revenueChart');
    document.getElementById('revenue-chart').parentElement.innerHTML = '<p class="no-data">Sin ventas registradas</p>';
    return;
  }
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    const key = d.toISOString().split('T')[0];
    byDay[key] = 0;
  }
  sales.forEach(s => {
    const day = s.created_at.split('T')[0];
    byDay[day] = (byDay[day]||0) + parseFloat(s.total||0);
  });

  const days = Object.keys(byDay).sort();
  const ctx = document.getElementById('revenue-chart').getContext('2d');
  if (revenueChart) { revenueChart.destroy(); revenueChart = null; }

  revenueChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: days.map(d => {
        const [,m,day] = d.split('-');
        return `${parseInt(day)}/${parseInt(m)}`;
      }),
      datasets: [{
        data: days.map(d => byDay[d]),
        backgroundColor: 'rgba(201,164,98,.75)',
        borderColor: '#C9A462',
        borderWidth: 1,
        borderRadius: 5,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => `$${c.parsed.y.toLocaleString('es-MX')}` } }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { callback: v => `$${v.toLocaleString('es-MX')}`, font:{size:11} },
          grid: { color:'#F0E8E0' }
        },
        x: { grid:{display:false}, ticks:{font:{size:11}} }
      }
    }
  });
}

/* Category chart */
function renderCatChart() {
  const catMap = {};
  sales.forEach(s => {
    if (!Array.isArray(s.items)) return;
    s.items.forEach(item => {
      const prod = products.find(p => p.id === item.id);
      const cat = prod?.category_label || prod?.category || 'Otro';
      catMap[cat] = (catMap[cat]||0) + (item.subtotal||0);
    });
  });

  const entries = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const ctx = document.getElementById('cat-chart').getContext('2d');
  if (catChart) { catChart.destroy(); catChart = null; }

  if (!entries.length) {
    document.getElementById('cat-chart').parentElement.innerHTML = '<p class="no-data">Sin datos de categorías</p>';
    return;
  }

  const COLORS = ['#C9A462','#34d399','#60a5fa','#f472b6','#a78bfa','#fb923c','#fbbf24'];
  catChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: entries.map(([k])=>k),
      datasets: [{ data: entries.map(([,v])=>v), backgroundColor: COLORS.slice(0,entries.length), borderWidth: 2, borderColor:'#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position:'bottom', labels:{ font:{family:'Inter',size:11}, padding:10, boxWidth:12 } },
        tooltip: {
          callbacks: {
            label: c => {
              const total = c.dataset.data.reduce((s,v)=>s+v,0);
              return ` $${c.parsed.toLocaleString('es-MX',{maximumFractionDigits:0})} (${Math.round(c.parsed/total*100)}%)`;
            }
          }
        }
      }
    }
  });
}

/* Top productos */
function aggregateProducts() {
  const map = {};
  sales.forEach(s => {
    if (!Array.isArray(s.items)) return;
    s.items.forEach(item => {
      if (!map[item.id]) map[item.id] = { name: item.name, qty:0, revenue:0 };
      map[item.id].qty += item.qty||1;
      map[item.id].revenue += item.subtotal||0;
    });
  });
  return Object.values(map).sort((a,b)=>b.revenue-a.revenue);
}

function renderTopProducts() {
  const prods = aggregateProducts().slice(0,8);
  const el = document.getElementById('top-products');
  if (!prods.length) { el.innerHTML = '<p class="no-data">Sin ventas en el período</p>'; return; }
  const maxRev = prods[0].revenue || 1;
  el.innerHTML = prods.map((p,i) => `
<div class="top-prod-item">
  <div class="tp-rank">${i+1}</div>
  <div class="tp-info">
    <div class="tp-name" title="${p.name}">${p.name}</div>
    <div class="tp-bar-wrap"><div class="tp-bar" style="width:${Math.round(p.revenue/maxRev*100)}%"></div></div>
  </div>
  <div class="tp-stats">
    <div class="tp-revenue">$${p.revenue.toLocaleString('es-MX',{maximumFractionDigits:0})}</div>
    <div class="tp-qty">${p.qty} ud${p.qty!==1?'s':''}</div>
  </div>
</div>`).join('');
}

/* Ventas recientes */
function renderRecentSales() {
  const el = document.getElementById('recent-sales');
  const recent = sales.slice(0, 10); // ya vienen ordenadas desc
  if (!recent.length) { el.innerHTML = '<p class="no-data">Sin ventas en el período</p>'; return; }
  el.innerHTML = recent.map(s => {
    const t = new Date(s.created_at);
    const time = t.toLocaleString('es-MX',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const prods = Array.isArray(s.items) ? s.items.map(i=>i.name).join(', ') : '—';
    return `
<div class="recent-item">
  <div style="flex:1;min-width:0">
    <div class="recent-products" title="${prods}">${prods}</div>
    <div class="recent-time">${time}</div>
  </div>
  <div class="recent-amount">$${parseFloat(s.total).toLocaleString('es-MX',{maximumFractionDigits:0})}</div>
</div>`;
  }).join('');
}

/* Inventario */
function renderInventory() {
  const out  = products.filter(p => p.stock===0 || p.out_of_stock);
  const low  = products.filter(p => p.stock===1 && !p.out_of_stock);
  const ok   = products.filter(p => p.stock>1  && !p.out_of_stock);

  document.getElementById('inv-out').textContent = out.length;
  document.getElementById('inv-low').textContent = low.length;
  document.getElementById('inv-ok').textContent  = ok.length;
  document.getElementById('inv-total-label').textContent = `${products.length} productos`;

  const el = document.getElementById('inv-list');
  const items = [
    ...out.map(p => ({name:p.name, badge:'Agotado', cls:'badge-red'})),
    ...low.map(p => ({name:p.name, badge:'1 ud.', cls:'badge-amber'}))
  ].slice(0,12);

  el.innerHTML = items.length
    ? items.map(i => `
<div class="inv-list-item">
  <span class="inv-name">${i.name}</span>
  <span class="badge-sm ${i.cls}">${i.badge}</span>
</div>`).join('')
    : '<p class="no-data" style="padding:16px 0">Todo el inventario tiene existencias ✓</p>';
}

/* ── PERIOD SWITCH ── */
async function setPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period===period));
  ['kpi-revenue','kpi-sales','kpi-avg'].forEach(id => document.getElementById(id).textContent = '…');
  await Promise.all([loadSales(), loadPreviousSales()]);
  renderAll();
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', async () => {
  await Promise.all([loadProducts(), loadSales(), loadPreviousSales()]);
  renderAll();
});
</script>
